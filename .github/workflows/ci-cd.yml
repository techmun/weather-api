name: ci-cd

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore WeatherAPI.slnx

      - name: Build
        run: dotnet build WeatherAPI.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test WeatherAPI.slnx --configuration Release --no-build --collect:"XPlat Code Coverage"