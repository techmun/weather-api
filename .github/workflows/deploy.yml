name: deploy

on:
  push:
    branches:
      - main

jobs:
  publish-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore WeatherAPI.slnx

      - name: Build
        run: dotnet build WeatherAPI.slnx --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish WeatherAPI/WeatherAPI.csproj --configuration Release --no-build --output ./publish /p:UseAppHost=false

      - name: Create deployment package
        run: |
          cd publish
          zip -r ../weatherapi.zip .

      - name: Deploy to Azure Web App
        if: env.AZURE_WEBAPP_PUBLISH_PROFILE != ''
        uses: azure/webapps-deploy@v3
        with:
          app-name: mf-weatherapi
          publish-profile: ${{ env.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./weatherapi.zip
